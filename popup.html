<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 280px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            color: #333;
            margin: 0;
        }

        h3 {
            margin: 0 0 10px;
            font-size: 16px;
        }

        p {
            margin: 5px 0;
            line-height: 1.5;
        }

        kbd {
            background: #eee;
            border: 1px solid #ccc;
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 11px;
        }

        .ver {
            color: #999;
            font-size: 11px;
            margin-top: 12px;
        }

        .lang {
            color: #4A90D9;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h3>🎤 Voice Clipboard</h3>
    <p>1. Click any text field</p>
    <p>2. Click the 🎤 button or press <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>V</kbd></p>
    <p>3. Speak and text appears instantly</p>
    <p>4. Auto-stops after 4s of silence</p>
    <p>5. Hold 🎤 for 1s to change language</p>
    <p class="lang">🌐 KO · EN · JA · ZH · ES · FR · DE</p>
    <p class="ver">v7.0.0</p>
</body>

</html>
